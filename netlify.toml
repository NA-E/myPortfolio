# Netlify configuration — deploy settings live here (version-controlled),
# not only in the Netlify UI. Site is deployed from Netlify via the GitHub NA-E account.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every path serves index.html so client-side routes
# (/portal/:token, /projects/:slug, /journal/:slug) resolve on direct load / refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
